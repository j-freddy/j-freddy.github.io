---
permalink: /n0tlsbg.html
layout: page
scripts: |
  <script src="../assets/js/permalimbo.js"></script>
---

<div id="my-ball"></div>

{%- assign limbo = site.data.permalimbo -%}


{%- if limbo.rabbit -%}
  {%- assign subrabbit = limbo.rabbit | sample: 12 -%}

  <div class="container" id="my-limbo">
    <div class="row">
      {%- for egg in subrabbit -%}
        <!-- Grid framework -->
        <div class="col-sm-3 px-2 py-2 d-flex align-items-stretch">
          <div class="card">
            <div class="card-body text-center p-0">
              <a href="{{ egg.url }}" class="p-3" id="egg-{{ forloop.index }}">
                <i class="fa-solid fa-paw"></i>
              </a>
            </div>
          </div>
        </div>
      {%- endfor -%}
    </div>
  </div>
{%- endif -%}
