- name: NVAE for Cardiac Shape Analysis
  img: "img/portfolio/cardiac-shape-analysis.png"
  start_date: "March 2024"
  end_date: "September 2024"
  frameworks:
    - Nouveau VAE
    - PyTorch
    - PyTorch Lightning
    - TorchIO
    - MONAI
    - Python
    - NumPy
    - Altair
    - TensorBoard
  description: |
    My MSc dissertation at Imperial College (2023-24), which won the Winton
    Capital Applied Computing MSc Prize, involves using state-of-the-art
    generative AI frameworks to learn population-level patterns in the shape of
    cardiac components. Analysis of these shapes are crucial for reliable
    diagnosis of heart diseases. A snippet of my abstract is provided below.<br
    /><br />

    <quote><i>
      "Cardiovascular diseases (CVDs) cause over 20 million deaths annually, with
      a third occuring prematurely in people under the age of 70. However, CVDs
      are largely preventable with early detection and intervention. Over recent
      years, there has been rapid progression in the development of automated
      techniques for cardiac magnetic resonance imaging (MRI) analysis. Accurate
      delineation of cardiac components is crucial to assist in anomaly
      detection and diagnosis, and shape analysis is an essential
      prerequisite.<br /><br />

      The emergence of deep learning has introduced powerful frameworks capable
      of automating the process of learning compact shape representations.
      Variational autoencoders (VAEs) are a class of generative models that
      excel at learning efficient low-dimensional representations of complex
      data. In particular, the Nouveau VAE (NVAE) is a deep hierarchical VAE
      that is the state-of-the-art among its class in encoding fine-grained
      details in high-resolution images.
      
      In this dissertation, we examine how the NVAE framework can be applied to
      cardiac shape analysis..."<br /><br />
    </i></quote>

    I am very grateful to Prof. Elsa Angelini and Prof. Loïc Le Folgoc for
    supervising me.<br /><br />

    <b>Source code will be available soon.</b>

- name: Contrastive Learning for Medical Imaging
  img: "img/portfolio/medmnist-contrastive.png"
  start_date: "November 2022"
  end_date: "June 2023"
  source_code: "https://github.com/j-freddy/simclr-medical-imaging"
  frameworks:
    - SimCLR
    - Contrastive Learning
    - PyTorch
    - PyTorch Lightning
    - Python
    - NumPy
    - Matplotlib
    - TensorBoard
  description: |
    Computer-aided diagnosis (CADx) is very important in clinical environments
    as they assist radiologists in interpreting medical images. This involves
    early detection of lesions, as well as enabling more accurate diagnosis.
    <br /><br />

    AI in general is advancing very rapidly. So, can we use these new,
    state-of-the-art AI techniques and integrate them within CADx?<br /><br />

    My BEng dissertation at Imperial College (2022-23) focuses on evaluating a
    specific framework for medical imaging: SimCLR. SimCLR is a self-supervised
    contrastive learning framework, which enables pretraining large
    convolutional networks like ResNet with unlabelled data. As a result, only a
    small amount of labelled data is required for downstream tasks like
    finetuning the model for classification. Traditionally, supervised learning
    requires lots of labelled data, so this is a very exciting prospect,
    especially since clinical environments tend to lack labelled data. The
    thesis involves proposing and evaluating novel techniques and workflows for
    medical images that improveme over existing SimCLR methods.

    I am very thankful to Prof. Ben Glocker for his supervision and guidance.

- name: LLMs for Detecting PCL
  img: "img/portfolio/nlp-pcl.png"
  start_date: "February 2024"
  end_date: "March 2024"
  source_code: https://gitlab.doc.ic.ac.uk/ffj20/nlp-cw
  frameworks:
    - RoBERTa
    - DistilRoBERTa
    - Transformers
    - PyTorch
    - Python
    - pandas
  description: |
    In Spring 2024, we (group of 2) developed an ensemble model (transfer
    learning of pretrained RoBERTa and DistilRoBERTa models) to detect
    Patronizing and Condescending Language as described by <a
    href="https://sites.google.com/view/pcl-detection-semeval2022/"
    target="_blank"
       rel="noopener noreferrer">
      SemEval 2022 Task 4: Subtask 1</a>.<br /><br />
    
    Our model achieved 0.5548 F1 score on the test set, which would've ranked
    22nd on the
    <a href="https://sites.google.com/view/pcl-detection-semeval2022/ranking"
    target="_blank"
       rel="noopener noreferrer">
      contest</a>. (The top performing teams were industrial research groups.)
    It outperforms baseline RoBERTa by over 0.06 in F1 score.<br /><br />

    This project was the coursework for the Natural Language Processing module
    at Imperial College, for which we achieved full marks.

