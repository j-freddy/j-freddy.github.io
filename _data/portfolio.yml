- name: Pintos
  img: "img/portfolio/pintos.png"
  frameworks:
    - C
  description: |
    Pintos is an operating system with a monolithic kernel. It supports basic
    functionality such as multithreading, running user programs and file
    systems.<br><br>

    Our challenge in Summer 2021 is to implement and extend its functionality,
    including non-busy wait, implementing system calls, priority scheduling and
    priority donation.

- name: Pawn Race
  img: "img/portfolio/pawn-race.png"
  source_code: "https://github.com/j-freddy/pawn-race"
  frameworks:
    - Java
    - JavaFX
  description: |
    During my 1st year at Imperial, the Department of Computing held an AI
    Kotlin Pawn Race, and I was one of the winners! (using a MCTS strategy)
    <br><br>

    Fast forward to the Summer term and I was
    <a href="https://github.com/j-freddy/chess" target="_blank"
       rel="noopener noreferrer">
      programming chess</a>
    in Java as a side hobby. I prototyped it to support Pawn Race and challenged
    myself to create a stronger AI. This time, I used Minimax with alpha-beta
    pruning, using the strategy of "space control" as a static evaluator. It
    triumphed over my Kotlin AI.
