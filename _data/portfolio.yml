- name: Duel!
  img: "img/portfolio/duel.png"
  preview: "https://litetj.itch.io/duel"
  frameworks:
    - Unity
    - C#
  description: |
    Duel! is a 2P shooter game I developed in Unity in 1 week for Brackeys Jam
    2020.2.<br><br>

    Given the time constraints, I opted for a simple game idea that is easily
    extendable, with a focus on providing an elegant interface and user
    experience. This involved smooth animations, a custom keybinds option, as
    well as rewriting the player physics, as Unity's default physics engine was
    rough and inconsistent. Overall, it was very exciting to work with limited
    time.<br><br>

    Watch the "behind the scenes" video:<br>
    <a href="https://www.youtube.com/watch?v=2NnTHHqoIrw" target="_blank"
       rel="noopener noreferrer">
      https://www.youtube.com/watch?v=2NnTHHqoIrw
    </a>
- name: WACC
  img: "img/portfolio/wacc.png"
  frameworks:
    - Scala
    - Parsley
    - ARM1176JZF-S
    - CI/CD
    - TDD
  description: |
    WACC is an imperative language that supports fundamental constructs such as
    variables, loops, conditional branching, arrays and functions. The preview
    image is a code snippet from a Tic-Tac-Toe AI written in WACC.<br><br>

    Our challenge in the 2022 Spring term at Imperial College? Given 6 weeks,
    write a compiler that performs syntax and semantic analysis on any WACC
    file, then (if valid) generates executable code for the ARM11 architecture.
    The four of us successfully implemented this in Scala and Parsley (parser
    combinator library) and got a 99% score in the backend code review.
    <br><br>

- name: SolarSearch
  img: "img/portfolio/solarsearch.png"
  source_code: "https://github.com/IC-Hack-2022/site"
  frameworks:
    - PyTorch
    - Flask
    - Python
    - Rasterio
    - JavaScript
    - MongoDB
    - HTML
    - BootStrap
    - SCSS
  description: |
    Solar Searcher is powered by a deep learning neural network AI and developed
    during IC Hack 22 in 24 hours.<br><br>

    Given a country, the web app generates a ranking of areas within the country
    that are most feasible for building solar farms. The ranking algorithm
    accounts for terrain, weather, atmospheric pollution and other factors,
    using a mixture of computer vision and third-party data.<br><br>
    
    More details can be found here:<br>
    <a href="https://devpost.com/software/solarsearch" target="_blank"
       rel="noopener noreferrer">
      https://devpost.com/software/solarsearch
    </a>
    
