- name: WACC
  img: "img/portfolio/wacc.png"
  frameworks:
    - Scala
    - Parsley
    - ARM1176JZF-S
    - CI/CD
    - TDD
  description: |
    WACC is an imperative language that supports fundamental constructs such as
    variables, loops, conditional branching, arrays and functions. The preview
    image is a code snippet from a Tic-Tac-Toe AI written in WACC.<br /><br />

    Our challenge in the 2022 Spring term? Given 6 weeks, write a compiler that
    performs syntax and semantic analysis on any WACC file, then (if valid)
    generates executable code for the ARM11 architecture. The four of us
    successfully implemented this in Scala and Parsley (parser combinator
    library) and got a 99% score in the backend code review. <br /><br />

