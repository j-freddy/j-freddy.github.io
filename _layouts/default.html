<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    {{ content }}

    {%- include footer.html -%}

    {%- include scripts.html -%}

    {%- if layout.scripts -%}
      {{ layout.scripts }}
    {%- endif -%}

    {%- if page.scripts -%}
      {{ page.scripts }}
    {%- endif -%}

  </body>
</html>
