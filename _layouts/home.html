<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <main class="page-content home-body d-flex flex-column" id="my-home"
          aria-label="Content">
      {{ content }}
      
      {%- include footer.html -%}
    </main>

    {%- include scripts.html -%}

    {%- if page.scripts -%}
      {{ page.scripts }}
    {%- endif -%}

  </body>

</html>
