---
layout: default
---

<main class="page-content page-body" aria-label="Content">
  <div class="wrapper">
    <article class="post">
  
      <header class="post-header">
        <h1 class="post-title text-center mt-3">{{ page.title | escape }}</h1>
      </header>

      <div class="mb-4">
        <p>
          <i class="fa-solid fa-calendar me-3"></i>{{ page.date }}<br>
          <i class="fa-solid fa-user me-3"></i>{{ page.author }}
        </p>
      </div>
    
      <div class="post-content">
        {{ content }}
      </div>
    
    </article> 
  </div>
</main>
