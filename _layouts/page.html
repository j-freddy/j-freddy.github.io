---
layout: default
---

<main class="page-content page-body
  {% if page.title-layout == 'jumbotron' %} p-0{% endif %}
  {% unless page.no-background %} bg-normal {% endunless %}
  aria-label="Content">
  <article class="post">

    <!-- Render title -->
    {%- if page.title -%}
      <header class="post-header">
        {%- if page.title-layout == "jumbotron" -%}
          {%- include components/title-jumbotron.html -%}
        {%- else -%}
          {%- if page.title -%}
            <h1 class="post-title text-center mt-3">{{ page.title | escape }}</h1>
          {%- endif -%}
        {%- endif -%}
      </header>
    {%- endif -%}
  
    <!-- Render page -->
    <div class="wrapper">
      <div class="post-content">
        {{ content }}
      </div>
    </div>
  
  </article>
</main>
