---

{%- assign site_projects = site.data.portfolio -%}
{%- assign assets_path = "../assets/" -%}

<div class="container" id="my-portfolio">
  {%- if site_projects -%}
    <div class="row">
    {%- for project in site_projects -%}
      <div class="col-md-4 px-0 pe-3 py-2 d-flex align-items-stretch">
        <div class="card">
          <img src="{{ assets_path }}{{ project.img }}"
               class="card-img-top project-preview"
               id="project-preview-{{ forloop.index }}">
          <div class="card-body text-center">
            <small><b>{{ project.name }}</b></small>
            <!-- Tags here -->
            <!-- e.g. Python, JavaScript -->
          </div>
        </div>
      </div>
      <div class="w3-modal project-modal"
           id="project-modal-{{ forloop.index }}">
        <div class="w3-modal-content w3-animate-zoom">
          <div class="w3-card">
            <span class="w3-button w3-display-topright project-modal-close"
                  id="project-modal-close-{{ forloop.index }}">
              &times;
            </span>
            <img src="{{ assets_path }}{{ project.img }}">
            <div class="w3-container">
              <p>Hello world!</p>
            </div>
          </div>
        </div>
      </div>
    {%- endfor -%}
    </div>
  {%- endif -%}
</div>
